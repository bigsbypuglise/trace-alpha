name: Windows CI + Alpha Release

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (VS2022, Qt6, FFmpeg)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt 6 (Widgets + imageformats)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          modules: "qtimageformats"

      - name: Install vcpkg + FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install ffmpeg:x64-windows
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Resolve build tools and dependency paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $qtRoot = $env:QT_ROOT_DIR
          if (-not $qtRoot -or -not (Test-Path $qtRoot)) {
            throw "QT_ROOT_DIR is missing; Qt install did not complete correctly."
          }

          $windeployqt = Join-Path $qtRoot "bin\windeployqt.exe"
          if (-not (Test-Path $windeployqt)) {
            throw "windeployqt.exe not found at expected path: $windeployqt"
          }

          $ffmpegBin = Join-Path $env:VCPKG_ROOT "installed\x64-windows\bin"
          if (-not (Test-Path $ffmpegBin)) {
            throw "FFmpeg runtime bin not found: $ffmpegBin"
          }

          "WINDEPLOYQT=$windeployqt" | Out-File -FilePath $env:GITHUB_ENV -Append
          "FFMPEG_BIN=$ffmpegBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_PREFIX_PATH=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake (Release, VS2022 x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build Trace target (Release)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build build --config Release --target Trace --parallel

      - name: Package portable ZIP (Trace + Qt + runtime DLLs)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exe = Join-Path $PWD "build\app\Release\Trace.exe"
          if (-not (Test-Path $exe)) {
            $exe = Get-ChildItem "$PWD\build" -Recurse -Filter Trace.exe | Select-Object -First 1 | ForEach-Object { $_.FullName }
          }
          if (-not $exe) {
            throw "Trace.exe not found after build."
          }

          $distRoot = Join-Path $PWD "dist"
          $dist = Join-Path $distRoot "trace-alpha-windows-x64"
          $zip = Join-Path $distRoot "trace-alpha-windows-x64.zip"

          if (Test-Path $dist) { Remove-Item $dist -Recurse -Force }
          if (Test-Path $zip) { Remove-Item $zip -Force }

          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          Copy-Item $exe (Join-Path $dist "Trace.exe") -Force

          & "$env:WINDEPLOYQT" --release --compiler-runtime (Join-Path $dist "Trace.exe")

          # FFmpeg DLLs are required when TRACE_WITH_FFMPEG is enabled.
          Copy-Item (Join-Path $env:FFMPEG_BIN "*.dll") $dist -Force

          Compress-Archive -Path "$dist\*" -DestinationPath $zip

      - name: Upload workflow artifact (every push/tag)
        uses: actions/upload-artifact@v4
        with:
          name: trace-alpha-windows-x64
          path: dist/trace-alpha-windows-x64.zip
          if-no-files-found: error

      - name: Publish/Update rolling prerelease asset (every successful build)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha-latest
          name: Alpha Latest
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          body: |
            Automated latest successful Windows build.

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: dist/trace-alpha-windows-x64.zip

      - name: Publish/Update versioned prerelease asset (tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: dist/trace-alpha-windows-x64.zip
